# Ziel: NEUE Workflow-Datei in eegfaktura/eegfaktura-admin (existiert dort
# bisher nicht). Frontend-SPA, Caddy-served. Build-Flow:
#   1. npm ci + npm run build -> erzeugt build/
#   2. docker/build-push-action -> GHCR
#      (keycloak-config.json ist als Caddy-Env-Template eingecheckt und wird
#      via `ADD keycloak-config.json /srv` gebacken; Caddy rendert es zur
#      Laufzeit aus KEYCLOAK_URL/_REALM/_CLIENT_ID — kein Runtime-Mount noetig)
#
# Image-Pfad: ghcr.io/eegfaktura/eeg-registration-frontend (Legacy-Name aus
# der Makefile beibehalten, damit kein Image-Rename noetig ist).
#
# ⚠️ STUFE 1: KEIN repository_dispatch-Job. Erstmal nur sicherstellen, dass
# der Source-Code auf einer CI-Maschine durchbaut. Wenn 1-2 push-builds gruen
# sind und das Image im Cluster manuell getestet wurde, wird der
# dispatch-deploy-Job in einer zweiten Iteration ergaenzt (Stufe 3).
#
# Vorbedingung Stufe 1: keine (GITHUB_TOKEN reicht aus, kein PLATFORM_DEPLOY_PAT).
# Vorbedingung Stufe 3: `PLATFORM_DEPLOY_PAT`-Secret im Repo + dispatch-deploy
# job in dieser Datei.

name: Docker Image CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: "ghcr.io"
  # Development-Tier (ADR-0005): Push nach vfeeg-development. Legacy-Image-Name
  # eeg-registration-frontend (aus der Makefile) bewusst beibehalten — NICHT
  # ${{ github.repository }} (= eegfaktura/eegfaktura-admin).
  IMAGE_NAME: "vfeeg-development/eeg-registration-frontend"

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm install` statt `npm ci`: package-lock.json ist im Source-Repo
        # nicht synchron mit package.json. `npm ci` erzwingt Sync und failt
        # sofort, `npm install` regeneriert den Lock-Stand. Long-term-Fix waere
        # `npm install && commit package-lock.json` im Source-Repo.
        # (--legacy-peer-deps nicht mehr noetig: das ungenutzte
        #  @mui/x-date-pickers@8 wurde aus package.json entfernt -> der
        #  peer-deps-Konflikt mit @mui/material@5 ist aufgeloest.)
        run: npm install

      - name: Build SPA (npm run build -> ./build)
        # TSC_COMPILE_ON_ERROR: der Source hat vorbestehende TS-Typfehler
        # (MUI-Dialog-`PaperProps={{component:'form'}}`-Pattern, schon im
        # prod-Image v0.2.15 vorhanden). Das JS kompiliert korrekt (babel);
        # nur der strikte ForkTsChecker unter CI=true wuerde sie fatal machen.
        # Wir bauen daher trotz Typ-Warnungen -- entspricht dem Build, aus dem
        # v0.2.15 hervorging.
        env:
          TSC_COMPILE_ON_ERROR: "true"
        run: npm run build

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title="eegfaktura-admin"
            org.opencontainers.image.description="EEG Faktura admin frontend - Administration tool for EEG manager (meteringpoints + participants)"
            org.opencontainers.image.source=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.url=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.version=${{ github.sha || '' }}
            org.opencontainers.image.revision=${{ github.sha || '' }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || '' }}
            org.opencontainers.image.authors="eegfaktura@vfeeg.org"
            org.opencontainers.image.vendor="Verein zur Förderung von Erneuerbaren Energiegemeinschaften"
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id || '' }}
            org.opencontainers.image.ref.name=${{ github.ref || '' }}
            org.opencontainers.image.ref.sha=${{ github.sha || '' }}
            org.opencontainers.image.repository=${{ github.repository || '' }}

      - name: Login to Container Registry
        # Pull-Requests aus Forks haben keine packages:write-Permission — Login-Step
        # wuerde sonst beim PR-Build failen. Nur bei push-Events anmelden + pushen.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # Cross-Org-Push nach vfeeg-development — GITHUB_TOKEN reicht nicht.
          password: ${{ secrets.VFEEG_DEV_PUSH_PAT }}

      - name: Build (PR) / Build and push (push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags || 'latest' }}
          labels: ${{ steps.meta.outputs.labels || '' }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # Triggert das Platform-Repo, damit es den Cluster aktualisiert (Stufe 3).
  # Laeuft nur bei push to default-branch (main/master), nicht bei PRs/Tags.
  # Vorbedingung: PLATFORM_DEPLOY_PAT-Secret im Repo + Mapping
  # `deploy-admin-frontend` in deploy-on-dispatch.yml (vorhanden) + Manifest
  # k8s/33-admin-frontend.yaml zeigt auf vfeeg-development/...:latest (umgestellt).
  dispatch-deploy:
    needs: build-and-push-image
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy in platform repo
        env:
          GH_TOKEN: ${{ secrets.PLATFORM_DEPLOY_PAT }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "event_type": "deploy-admin-frontend",
            "client_payload": {
              "image_tag": "latest",
              "source_sha": "${GITHUB_SHA}",
              "source_repo": "${GITHUB_REPOSITORY}",
              "source_ref": "${GITHUB_REF}"
            }
          }
          EOF
          )
          echo "$PAYLOAD" | gh api repos/vfeeg-development/eegfaktura-platform/dispatches --input -
          echo "Dispatched deploy-admin-frontend for sha=${GITHUB_SHA:0:8}"
