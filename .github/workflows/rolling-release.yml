# Ziel: NEUE Workflow-Datei in eegfaktura/eegfaktura-admin (existiert dort
# bisher nicht). Frontend-SPA, Caddy-served. Build-Flow:
#   1. npm ci + npm run build -> erzeugt build/
#   2. Dummy keycloak-config.json erzeugen (wird im Cluster per ConfigMap
#      `eegfaktura-web-keycloak` ueberschrieben, muss nur im Build-Context
#      existieren damit der `ADD keycloak-config.json /srv` im Dockerfile
#      nicht failed).
#   3. docker/build-push-action -> GHCR
#
# Image-Pfad: ghcr.io/eegfaktura/eeg-registration-frontend (Legacy-Name aus
# der Makefile beibehalten, damit kein Image-Rename noetig ist).
#
# ⚠️ STUFE 1: KEIN repository_dispatch-Job. Erstmal nur sicherstellen, dass
# der Source-Code auf einer CI-Maschine durchbaut. Wenn 1-2 push-builds gruen
# sind und das Image im Cluster manuell getestet wurde, wird der
# dispatch-deploy-Job in einer zweiten Iteration ergaenzt (Stufe 3).
#
# Vorbedingung Stufe 1: keine (GITHUB_TOKEN reicht aus, kein PLATFORM_DEPLOY_PAT).
# Vorbedingung Stufe 3: `PLATFORM_DEPLOY_PAT`-Secret im Repo + dispatch-deploy
# job in dieser Datei.

name: Docker Image CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: "ghcr.io"
  # Achtung: NICHT ${{ github.repository }} - das waere `eegfaktura/eegfaktura-admin`.
  # Wir behalten den Legacy-Image-Namen aus der Makefile.
  IMAGE_NAME: "eegfaktura/eeg-registration-frontend"

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # `npm install` statt `npm ci`: package-lock.json ist im Source-Repo
        # nicht synchron mit package.json — diverse Pakete fehlen im Lock-File
        # (@maskito/core, @mui/x-data-grid, etc.). `npm ci` erzwingt Sync und
        # failt sofort, `npm install` regeneriert den Lock-Stand. Long-term-Fix
        # waere `npm install && commit package-lock.json` im Source-Repo.
        # --legacy-peer-deps: @mui/x-date-pickers@8.x clasht mit @mui/material@5.x.
        run: npm install --legacy-peer-deps

      - name: Build SPA (npm run build -> ./build)
        run: npm run build

      - name: Stub keycloak-config.json for Docker build context
        run: |
          # Dockerfile macht `ADD keycloak-config.json /srv`. Im Cluster wird
          # die Datei per ConfigMap-Mount (eegfaktura-web-keycloak) ueber-
          # schrieben, deshalb reicht eine leere JSON.
          echo '{}' > keycloak-config.json

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title="eegfaktura-admin"
            org.opencontainers.image.description="EEG Faktura admin frontend - Administration tool for EEG manager (meteringpoints + participants)"
            org.opencontainers.image.source=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.url=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.version=${{ github.sha || '' }}
            org.opencontainers.image.revision=${{ github.sha || '' }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || '' }}
            org.opencontainers.image.authors="eegfaktura@vfeeg.org"
            org.opencontainers.image.vendor="Verein zur Förderung von Erneuerbaren Energiegemeinschaften"
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id || '' }}
            org.opencontainers.image.ref.name=${{ github.ref || '' }}
            org.opencontainers.image.ref.sha=${{ github.sha || '' }}
            org.opencontainers.image.repository=${{ github.repository || '' }}

      - name: Login to Container Registry
        # Pull-Requests aus Forks haben keine packages:write-Permission — Login-Step
        # wuerde sonst beim PR-Build failen. Nur bei push-Events anmelden + pushen.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) / Build and push (push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags || 'latest' }}
          labels: ${{ steps.meta.outputs.labels || '' }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # NOTE — Stufe 3: hier kommt ein zweiter Job `dispatch-deploy` rein,
  # analog zu eegfaktura-filestore-rolling-release.yml.
  # Erst aktivieren, wenn:
  #   - Build oben mindestens 1x erfolgreich auf push-to-default-branch
  #   - K8s-Manifest k8s/33-admin-frontend.yaml im Platform-Repo getestet
  #     (zeigt schon auf ghcr.io/eegfaktura/eeg-registration-frontend:latest)
  #   - Platform-Workflow deploy-on-dispatch.yml akzeptiert `deploy-admin-frontend`
  #     bereits (Mapping ist drin)
  #   - `PLATFORM_DEPLOY_PAT`-Secret im Source-Repo gesetzt
